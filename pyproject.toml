[project]
name = "qliqy-mailer"
version = "0.1.0"
authors = [{ name = "ilia2003", email= "fedorenkoilia@gmail.com"}]
description = "Qliqy | Mailer Service"
requires-python = ">=3.13"
dependencies = [
    "faststream[rabbit,cli]==0.6.3",
    "aiosmtplib==3.0.2",
    "loguru==0.7.3",
    "pydantic-settings>=2.0.0",
    "email-validator>=2.0.0",
    "jinja2==3.1.6",
    "poethepoet==0.37.0",
    "sqlalchemy>=2.0",
    "asyncpg>=0.30.0",
    "alembic>=1.13.0",
    "greenlet>=3.0.0",
]

[dependency-groups]
dev = ["ruff==0.14.3", "tzdata>=2025.3"]

[tool.poe]
envfile = [".env"]
verbosity = 1

[tool.poe.tasks.dev]
cmd = "faststream run app.main:app"

# migrations
[tool.poe.tasks.create-migration]
cmd = "alembic revision --autogenerate -m \"${message}\""
args = { message = { options = ["-m"], default = "autogenerated_migration" }}
[tool.poe.tasks.apply-migrations]
cmd = "alembic upgrade head"
[tool.poe.tasks.revert-migration]
cmd = "alembic downgrade -1"

[tool.poe.tasks.format]
sequence = [
  {cmd = "uv run ruff check --fix app"},
  {cmd = "uv run ruff format app"},
]

# uploading fixtures
[tool.poe.tasks.init-db]
script = "dev.init_database:main_init()"
[tool.poe.tasks.drop-db]
script = "dev.init_database:main_drop()"
